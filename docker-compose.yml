version: "3.8"
services:
  go-via:
    image: go-via:local
    container_name: go-via
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - ./data:/app/data
      - ./cert:/app/cert
    environment:
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/v1/version"]
      interval: 30s
      timeout: 5s
      retries: 3
